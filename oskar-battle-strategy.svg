<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 595 842" width="595" height="842">
  <style>
    .title { font: bold 18px Arial, sans-serif; fill: white; }
    .subtitle { font: 11px Arial, sans-serif; fill: #b0b0cc; }
    .node-text { font: bold 10px Arial, sans-serif; fill: white; }
    .node-small { font: 9px Arial, sans-serif; fill: white; }
    .node-tiny { font: 8px Arial, sans-serif; fill: white; }
    .decision { font: bold 9px Arial, sans-serif; fill: #1a1a2e; }
    .decision-small { font: 8px Arial, sans-serif; fill: #1a1a2e; }
    .yes-label { font: bold 8px Arial, sans-serif; fill: #2d6a4f; }
    .no-label { font: bold 8px Arial, sans-serif; fill: #dc3545; }
    .action-title { font: bold 9px Arial, sans-serif; fill: white; }
    .action-detail { font: 7.5px Arial, sans-serif; fill: white; }
    .stat-label { font: bold 8px Arial, sans-serif; fill: #1a1a2e; }
    .stat-value { font: 8px Arial, sans-serif; fill: #4a4a6a; }
    .section-title { font: bold 11px Arial, sans-serif; fill: #1a1a2e; }
  </style>

  <!-- Background -->
  <rect width="595" height="842" fill="#fafafa"/>

  <!-- Header -->
  <rect x="20" y="12" width="555" height="50" rx="8" fill="#1a1a2e"/>
  <text x="297" y="33" text-anchor="middle" class="title">OSKAR — Battle Strategy</text>
  <text x="297" y="48" text-anchor="middle" class="subtitle">Level 2 Halfling Rogue | AC 14 | HP 15 | Speed 30ft | Init +5 | Sneak Atk 1d6</text>

  <!-- Quick Reference Box -->
  <rect x="20" y="68" width="555" height="38" rx="5" fill="#eef0f5" stroke="#c0c4d0" stroke-width="1"/>
  <text x="30" y="80" class="stat-label">Weapons:</text>
  <text x="78" y="80" class="stat-value">Shortsword +5, 1d6+3 (Vex) | Dagger +5, 1d4+3 (Nick) | Shortbow +5, 1d6+3 (Vex)</text>
  <text x="30" y="91" class="stat-label">Mastery:</text>
  <text x="66" y="91" class="stat-value">Vex = hit → Adv on next atk vs target | Nick = extra Light atk as part of Attack action (frees BA!)</text>
  <text x="30" y="102" class="stat-label">Halfling:</text>
  <text x="66" y="102" class="stat-value">Luck (reroll 1s) | Brave (Adv vs Frightened) | Nimbleness (move thru larger creatures) | Nat. Stealthy</text>

  <!-- ==================== MAIN FLOW ==================== -->

  <!-- START node -->
  <rect x="305" y="115" width="130" height="24" rx="12" fill="#4a4a6a"/>
  <text x="370" y="131" text-anchor="middle" class="node-text">YOUR TURN BEGINS</text>

  <!-- Arrow down -->
  <line x1="370" y1="139" x2="370" y2="150" stroke="#4a4a6a" stroke-width="1.5"/>
  <polygon points="370,155 366,148 374,148" fill="#4a4a6a"/>

  <!-- Decision 1: HP danger? y=158-208 -->
  <polygon points="370,158 455,183 370,208 285,183" fill="#fff3cd" stroke="#856404" stroke-width="1.5"/>
  <text x="370" y="181" text-anchor="middle" class="decision">HP ≤ 5 or</text>
  <text x="370" y="191" text-anchor="middle" class="decision">surrounded?</text>

  <!-- YES left to SURVIVE -->
  <line x1="285" y1="183" x2="175" y2="183" stroke="#dc3545" stroke-width="1.5"/>
  <polygon points="175,183 182,179 182,187" fill="#dc3545"/>
  <text x="235" y="177" class="yes-label">YES</text>

  <!-- SURVIVE box y=160-212 -->
  <rect x="25" y="160" width="148" height="52" rx="5" fill="#dc3545"/>
  <text x="99" y="175" text-anchor="middle" class="action-title">SURVIVE</text>
  <text x="99" y="186" text-anchor="middle" class="action-detail">BA: Cunning Action Disengage</text>
  <text x="99" y="196" text-anchor="middle" class="action-detail">Action: Dash away (Nimbleness</text>
  <text x="99" y="206" text-anchor="middle" class="action-detail">thru larger foes), then Hide</text>

  <!-- NO down -->
  <line x1="370" y1="208" x2="370" y2="232" stroke="#28a745" stroke-width="1.5"/>
  <polygon points="370,237 366,230 374,230" fill="#28a745"/>
  <text x="380" y="224" class="no-label">NO</text>

  <!-- Decision 2: Ally within 5ft? y=240-290 -->
  <polygon points="370,240 460,265 370,290 280,265" fill="#e2d4f0" stroke="#6f42c1" stroke-width="1.5"/>
  <text x="370" y="260" text-anchor="middle" class="decision">Ally within 5ft</text>
  <text x="370" y="270" text-anchor="middle" class="decision">of your target?</text>
  <text x="370" y="281" text-anchor="middle" class="decision-small">(Sneak Atk source)</text>

  <!-- YES left to OPTIMAL COMBO -->
  <line x1="280" y1="265" x2="175" y2="265" stroke="#28a745" stroke-width="1.5"/>
  <polygon points="175,265 182,261 182,269" fill="#28a745"/>
  <text x="232" y="259" class="yes-label">YES</text>

  <!-- OPTIMAL COMBO box y=232-304 -->
  <rect x="25" y="232" width="148" height="72" rx="5" fill="#28a745"/>
  <text x="99" y="245" text-anchor="middle" class="action-title">OPTIMAL COMBO</text>
  <text x="99" y="257" text-anchor="middle" class="action-detail">1. Shortsword (Vex) +5</text>
  <text x="99" y="267" text-anchor="middle" class="action-detail">   1d6+3 + 1d6 SA on hit!</text>
  <text x="99" y="279" text-anchor="middle" class="action-detail">2. Dagger (Nick) +5</text>
  <text x="99" y="289" text-anchor="middle" class="action-detail">   1d4+3 (free extra atk)</text>
  <text x="99" y="300" text-anchor="middle" class="node-tiny">Take SA on 1st hit — guaranteed!</text>

  <!-- NO down -->
  <line x1="370" y1="290" x2="370" y2="322" stroke="#dc3545" stroke-width="1.5"/>
  <polygon points="370,327 366,320 374,320" fill="#dc3545"/>
  <text x="380" y="311" class="no-label">NO</text>

  <!-- Decision 3: Hidden or have Adv? y=330-380 -->
  <polygon points="370,330 455,355 370,380 285,355" fill="#fff3cd" stroke="#856404" stroke-width="1.5"/>
  <text x="370" y="352" text-anchor="middle" class="decision">Are you Hidden</text>
  <text x="370" y="362" text-anchor="middle" class="decision">or have Adv?</text>

  <!-- YES left to AMBUSH STRIKE -->
  <line x1="285" y1="355" x2="175" y2="355" stroke="#28a745" stroke-width="1.5"/>
  <polygon points="175,355 182,351 182,359" fill="#28a745"/>
  <text x="235" y="349" class="yes-label">YES</text>

  <!-- AMBUSH STRIKE box y=324-386 -->
  <rect x="25" y="324" width="148" height="62" rx="5" fill="#4c51bf"/>
  <text x="99" y="337" text-anchor="middle" class="action-title">AMBUSH STRIKE</text>
  <text x="99" y="349" text-anchor="middle" class="action-detail">1. Shortsword +5 (w/ Adv)</text>
  <text x="99" y="359" text-anchor="middle" class="action-detail">   1d6+3 + 1d6 SA on hit!</text>
  <text x="99" y="371" text-anchor="middle" class="action-detail">2. Dagger (Nick) +5</text>
  <text x="99" y="381" text-anchor="middle" class="action-detail">   1d4+3 bonus attack</text>

  <!-- NO down -->
  <line x1="370" y1="380" x2="370" y2="410" stroke="#dc3545" stroke-width="1.5"/>
  <polygon points="370,415 366,408 374,408" fill="#dc3545"/>
  <text x="380" y="399" class="no-label">NO</text>

  <!-- Decision 4: Melee range? y=418-468 -->
  <polygon points="370,418 455,443 370,468 285,443" fill="#d4edda" stroke="#28a745" stroke-width="1.5"/>
  <text x="370" y="440" text-anchor="middle" class="decision">Enemy within</text>
  <text x="370" y="450" text-anchor="middle" class="decision">melee range?</text>

  <!-- YES left to VEX → NICK COMBO -->
  <line x1="285" y1="443" x2="175" y2="443" stroke="#28a745" stroke-width="1.5"/>
  <polygon points="175,443 182,439 182,447" fill="#28a745"/>
  <text x="235" y="437" class="yes-label">YES</text>

  <!-- VEX → NICK COMBO box y=406-488 -->
  <rect x="25" y="406" width="148" height="82" rx="5" fill="#d97706"/>
  <text x="99" y="419" text-anchor="middle" class="action-title">VEX → NICK COMBO</text>
  <text x="99" y="431" text-anchor="middle" class="action-detail">1. Shortsword (Vex) +5</text>
  <text x="99" y="441" text-anchor="middle" class="action-detail">   1d6+3 piercing</text>
  <text x="99" y="451" text-anchor="middle" class="action-detail">   If hit → Adv next atk!</text>
  <text x="99" y="463" text-anchor="middle" class="action-detail">2. Dagger (Nick) +5</text>
  <text x="99" y="473" text-anchor="middle" class="action-detail">   1d4+3 + 1d6 SNEAK</text>
  <text x="99" y="484" text-anchor="middle" class="node-tiny">★ Best no-setup Sneak Atk path</text>

  <!-- NO right to RANGED -->
  <line x1="455" y1="443" x2="510" y2="443" stroke="#dc3545" stroke-width="1.5"/>
  <line x1="510" y1="443" x2="510" y2="460" stroke="#dc3545" stroke-width="1.5"/>
  <polygon points="510,465 506,458 514,458" fill="#dc3545"/>
  <text x="480" y="437" class="no-label">NO</text>

  <!-- RANGED ATTACK box -->
  <rect x="440" y="468" width="135" height="55" rx="5" fill="#0d6efd"/>
  <text x="507" y="481" text-anchor="middle" class="action-title">RANGED ATTACK</text>
  <text x="507" y="493" text-anchor="middle" class="action-detail">Shortbow +5 (Vex)</text>
  <text x="507" y="503" text-anchor="middle" class="action-detail">1d6+3 piercing, 80/320</text>
  <text x="507" y="513" text-anchor="middle" class="action-detail">No Sneak Atk unless Adv/ally</text>

  <!-- ==================== BONUS ACTION SECTION ==================== -->
  <line x1="20" y1="540" x2="575" y2="540" stroke="#c0c4d0" stroke-width="0.5" stroke-dasharray="4,3"/>
  <text x="297" y="557" text-anchor="middle" class="section-title">BONUS ACTION</text>

  <!-- Decision: Can you hide? -->
  <polygon points="297,568 387,593 297,618 207,593" fill="#e0e7ff" stroke="#4c51bf" stroke-width="1.5"/>
  <text x="297" y="590" text-anchor="middle" class="decision">Can you Hide?</text>
  <text x="297" y="600" text-anchor="middle" class="decision-small">(cover / obscured)</text>

  <!-- YES left to HIDE -->
  <line x1="207" y1="593" x2="145" y2="593" stroke="#28a745" stroke-width="1.5"/>
  <polygon points="145,593 152,589 152,597" fill="#28a745"/>
  <text x="178" y="587" class="yes-label">YES</text>

  <rect x="25" y="575" width="118" height="42" rx="5" fill="#4c51bf"/>
  <text x="84" y="590" text-anchor="middle" class="action-title">CUNNING: HIDE (+7)</text>
  <text x="84" y="601" text-anchor="middle" class="action-detail">Naturally Stealthy: only</text>
  <text x="84" y="611" text-anchor="middle" class="action-detail">need creature cover!</text>

  <!-- NO right to TWO-WEAPON -->
  <line x1="387" y1="593" x2="440" y2="593" stroke="#dc3545" stroke-width="1.5"/>
  <polygon points="440,593 433,589 433,597" fill="#dc3545"/>
  <text x="410" y="587" class="no-label">NO</text>

  <rect x="442" y="575" width="130" height="42" rx="5" fill="#6c757d"/>
  <text x="507" y="590" text-anchor="middle" class="action-title">CUNNING: DASH/DISENGAGE</text>
  <text x="507" y="601" text-anchor="middle" class="action-detail">Reposition or escape safely</text>
  <text x="507" y="611" text-anchor="middle" class="action-detail">(Nick = free, BA stays open!)</text>

  <!-- ==================== MOVEMENT TIPS ==================== -->
  <line x1="20" y1="632" x2="575" y2="632" stroke="#c0c4d0" stroke-width="0.5" stroke-dasharray="4,3"/>
  <text x="297" y="649" text-anchor="middle" class="section-title">MOVEMENT PRIORITIES</text>

  <rect x="25" y="658" width="170" height="50" rx="5" fill="#198754" opacity="0.9"/>
  <text x="110" y="672" text-anchor="middle" class="action-title">BEST: NEAR ALLY</text>
  <text x="110" y="683" text-anchor="middle" class="action-detail">Attack target your ally is</text>
  <text x="110" y="693" text-anchor="middle" class="action-detail">next to = guaranteed Sneak Atk</text>
  <text x="110" y="703" text-anchor="middle" class="action-detail">then move behind ally for cover</text>

  <rect x="212" y="658" width="170" height="50" rx="5" fill="#4c51bf" opacity="0.9"/>
  <text x="297" y="672" text-anchor="middle" class="action-title">GOOD: FIND COVER</text>
  <text x="297" y="683" text-anchor="middle" class="action-detail">Stay near objects/creatures</text>
  <text x="297" y="693" text-anchor="middle" class="action-detail">to enable Bonus Action Hide</text>
  <text x="297" y="703" text-anchor="middle" class="action-detail">for next turn's Ambush Strike</text>

  <rect x="399" y="658" width="170" height="50" rx="5" fill="#d97706" opacity="0.9"/>
  <text x="484" y="672" text-anchor="middle" class="action-title">OK: STAY AT RANGE</text>
  <text x="484" y="683" text-anchor="middle" class="action-detail">Shortbow from 80ft if no</text>
  <text x="484" y="693" text-anchor="middle" class="action-detail">Sneak Atk sources available</text>
  <text x="484" y="703" text-anchor="middle" class="action-detail">15 HP = still stay mobile!</text>

  <!-- ==================== REMINDERS ==================== -->
  <rect x="20" y="722" width="555" height="60" rx="5" fill="#1a1a2e"/>
  <text x="297" y="737" text-anchor="middle" class="node-text">REMEMBER</text>
  <text x="297" y="748" text-anchor="middle" class="node-small">★ Alert: Prof bonus to Init (scales!), swap Init order with a willing ally after rolling</text>
  <text x="297" y="759" text-anchor="middle" class="node-small">★ Cunning Action (L2): Dash, Disengage, or Hide as Bonus Action — Nick frees your BA every turn!</text>
  <text x="297" y="770" text-anchor="middle" class="node-small">★ SA is once per TURN — take it on 1st hit when you qualify. With Vex→Nick (no ally), save for Dagger.</text>
  <text x="297" y="781" text-anchor="middle" class="node-small">★ Opportunity Attacks are on the ENEMY's turn — you can land a 2nd Sneak Atk via OA each round!</text>

  <!-- ==================== DAMAGE REFERENCE ==================== -->
  <rect x="20" y="792" width="555" height="40" rx="5" fill="#eef0f5" stroke="#c0c4d0" stroke-width="1"/>
  <text x="297" y="806" text-anchor="middle" class="stat-label">DAMAGE SUMMARY PER TURN</text>
  <text x="150" y="818" text-anchor="middle" class="stat-value">With Sneak Atk: 1d6+3 + 1d4+3 + 1d6 = avg 15.5</text>
  <text x="445" y="818" text-anchor="middle" class="stat-value">Without Sneak Atk: 1d6+3 + 1d4+3 = avg 12</text>
</svg>