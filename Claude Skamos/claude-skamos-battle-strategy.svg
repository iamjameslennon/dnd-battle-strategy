<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 595 850" width="595" height="850">
  <style>
    .title { font: bold 16px Arial, sans-serif; fill: white; }
    .subtitle { font: 9.5px Arial, sans-serif; fill: #b0b0d0; }
    .node-text { font: bold 10px Arial, sans-serif; fill: white; }
    .decision { font: bold 9px Arial, sans-serif; fill: #1a1a2e; }
    .decision-sm { font: bold 8px Arial, sans-serif; fill: #1a1a2e; }
    .yes-label { font: bold 8px Arial, sans-serif; fill: #28a745; }
    .no-label { font: bold 8px Arial, sans-serif; fill: #dc3545; }
    .action-title { font: bold 9px Arial, sans-serif; fill: white; }
    .action-detail { font: 7px Arial, sans-serif; fill: white; }
    .stat-label { font: bold 8px Arial, sans-serif; fill: #1a1a2e; }
    .stat-value { font: 8px Arial, sans-serif; fill: #4a4a6a; }
    .box-title { font: bold 9px Arial, sans-serif; fill: white; }
    .banner-title { font: bold 10px Arial, sans-serif; fill: #663c00; }
    .banner-text { font: 8px Arial, sans-serif; fill: #4a3000; }
  </style>

  <!-- Background -->
  <rect width="595" height="850" fill="#f5f5f5"/>

  <!-- Header -->
  <rect x="15" y="10" width="565" height="45" rx="6" fill="#1a1a2e"/>
  <text x="297" y="30" text-anchor="middle" class="title">CLAUDE SKAMOS — BATTLE STRATEGY</text>
  <text x="297" y="44" text-anchor="middle" class="subtitle">Level 2 Tiefling Wizard | HP 10 | AC 10 (13 w/ Mage Armor) | Spell DC 13 | Spell Atk +5 | 3 × 1st-level slots</text>

  <!-- ============ TOP REFERENCE ROW ============ -->

  <!-- Quick Reference -->
  <rect x="15" y="62" width="180" height="80" rx="4" fill="white" stroke="#ccc" stroke-width="1"/>
  <rect x="15" y="62" width="180" height="16" rx="4" fill="#495057"/>
  <text x="105" y="73" text-anchor="middle" class="box-title">QUICK REFERENCE</text>
  <text x="22" y="91" class="stat-label">Fire Bolt:</text><text x="92" y="91" class="stat-value">+5, 1d10 fire, 120ft</text>
  <text x="22" y="103" class="stat-label">Spell Slots:</text><text x="92" y="103" class="stat-value">3 × 1st level</text>
  <text x="22" y="115" class="stat-label">Tasha's:</text><text x="92" y="115" class="stat-value">1/LR FREE cast</text>
  <text x="22" y="127" class="stat-label">Resistance:</text><text x="92" y="127" class="stat-value">Fire damage</text>
  <text x="22" y="139" class="stat-label">Recovery:</text><text x="92" y="139" class="stat-value">+1 slot post-SR (1/LR)</text>

  <!-- Survival Priority -->
  <rect x="205" y="62" width="180" height="80" rx="4" fill="white" stroke="#ccc" stroke-width="1"/>
  <rect x="205" y="62" width="180" height="16" rx="4" fill="#dc3545"/>
  <text x="295" y="73" text-anchor="middle" class="box-title">⚠ SURVIVAL PRIORITY</text>
  <text x="212" y="91" class="stat-value">• Mage Armor BEFORE the fight</text>
  <text x="212" y="103" class="stat-value">• 10 HP — stay 60–120 ft back</text>
  <text x="212" y="115" class="stat-value">• Always reserve a slot for Shield</text>
  <text x="212" y="127" class="stat-value">• Use cover (½ +2 AC, ¾ +5 AC)</text>
  <text x="212" y="139" class="stat-value">• Never melee. Ever.</text>

  <!-- Prepared Spells -->
  <rect x="395" y="62" width="185" height="80" rx="4" fill="white" stroke="#ccc" stroke-width="1"/>
  <rect x="395" y="62" width="185" height="16" rx="4" fill="#6f42c1"/>
  <text x="487" y="73" text-anchor="middle" class="box-title">PREPARED FROM BOOK (5)</text>
  <text x="402" y="91" class="stat-label">Shield (R)</text><text x="487" y="91" class="stat-value">+5 AC, blocks Mag.Mis.</text>
  <text x="402" y="103" class="stat-label">Mage Armor</text><text x="487" y="103" class="stat-value">AC 13, 8 hours</text>
  <text x="402" y="115" class="stat-label">Magic Missile</text><text x="487" y="115" class="stat-value">3 × 1d4+1 force, auto</text>
  <text x="402" y="127" class="stat-label">Chromatic Orb</text><text x="487" y="127" class="stat-value">3d8 elem., +5, 90ft</text>
  <text x="402" y="139" class="stat-label">Grease</text><text x="487" y="139" class="stat-value">DEX 13, 10ft sq, prone</text>

  <!-- ============ PRE-COMBAT BANNER ============ -->
  <rect x="15" y="152" width="565" height="48" rx="4" fill="#fff3cd" stroke="#856404" stroke-width="1.5"/>
  <text x="297" y="167" text-anchor="middle" class="banner-title">⚡ BEFORE COMBAT — Cast MAGE ARMOR (8 hr → AC 13).  Always start a fight with it up.</text>
  <text x="297" y="179" text-anchor="middle" class="banner-text">Find Familiar (ritual, 10 min, no slot) — Summon before adventuring. Help action = free advantage. Owl recommended (Flyby).</text>
  <text x="297" y="191" text-anchor="middle" class="banner-text">Tasha's Hideous Laughter: 1 FREE cast/LR (Magic Initiate, auto-prepared) — burn the freebie before spending a slot.</text>

  <!-- ============ MAIN FLOWCHART ============ -->

  <!-- START NODE -->
  <ellipse cx="297" cy="219" rx="50" ry="16" fill="#2d6a4f"/>
  <text x="297" y="223" text-anchor="middle" class="node-text">YOUR TURN</text>

  <!-- Arrow START → D1 -->
  <line x1="297" y1="235" x2="297" y2="249" stroke="#333" stroke-width="1.5"/>
  <polygon points="297,254 293,246 301,246" fill="#333"/>

  <!-- ===== D1: HP critical? ===== -->
  <polygon points="297,259 357,284 297,309 237,284" fill="#f8d7da" stroke="#dc3545" stroke-width="1.5"/>
  <text x="297" y="281" text-anchor="middle" class="decision">HP ≤ 5  OR</text>
  <text x="297" y="293" text-anchor="middle" class="decision">about to die?</text>

  <!-- D1 YES → DEFENSIVE (left) -->
  <line x1="237" y1="284" x2="185" y2="284" stroke="#dc3545" stroke-width="1.5"/>
  <polygon points="180,284 188,280 188,288" fill="#dc3545"/>
  <text x="200" y="277" class="no-label" fill="#dc3545">YES</text>

  <rect x="80" y="257" width="100" height="55" rx="4" fill="#28a745"/>
  <text x="130" y="273" text-anchor="middle" class="action-title">DEFENSIVE TURN</text>
  <text x="130" y="287" text-anchor="middle" class="action-detail">Hide / break LoS</text>
  <text x="130" y="297" text-anchor="middle" class="action-detail">Stay behind cover</text>
  <text x="130" y="306" text-anchor="middle" class="action-detail">Hold Shield (R)</text>

  <!-- D1 NO → arrow to D2 -->
  <line x1="297" y1="309" x2="297" y2="328" stroke="#28a745" stroke-width="1.5"/>
  <polygon points="297,333 293,325 301,325" fill="#28a745"/>
  <text x="307" y="327" class="yes-label">NO</text>

  <!-- ===== D2: Enemy within 30ft? ===== -->
  <polygon points="297,338 357,363 297,388 237,363" fill="#fff3cd" stroke="#856404" stroke-width="1.5"/>
  <text x="297" y="360" text-anchor="middle" class="decision">Enemy within</text>
  <text x="297" y="372" text-anchor="middle" class="decision">30 ft of you?</text>

  <!-- D2 YES → DISENGAGE (left) -->
  <line x1="237" y1="363" x2="185" y2="363" stroke="#dc3545" stroke-width="1.5"/>
  <polygon points="180,363 188,359 188,367" fill="#dc3545"/>
  <text x="200" y="356" class="no-label" fill="#dc3545">YES</text>

  <rect x="80" y="336" width="100" height="65" rx="4" fill="#28a745"/>
  <text x="130" y="352" text-anchor="middle" class="action-title">DISENGAGE</text>
  <text x="130" y="364" text-anchor="middle" class="action-detail">Move 30ft to safe range</text>
  <text x="130" y="374" text-anchor="middle" class="action-detail">If 2+ adjacent: drop</text>
  <text x="130" y="383" text-anchor="middle" class="action-detail">Grease at your feet</text>
  <text x="130" y="392" text-anchor="middle" class="action-detail" style="font-size:6.5px">→ Fire Bolt from cover</text>

  <!-- D2 NO → arrow to D3 -->
  <line x1="297" y1="388" x2="297" y2="407" stroke="#28a745" stroke-width="1.5"/>
  <polygon points="297,412 293,404 301,404" fill="#28a745"/>
  <text x="307" y="406" class="yes-label">NO</text>

  <!-- ===== D3: Familiar active? ===== -->
  <polygon points="297,417 352,439 297,461 242,439" fill="#d4edda" stroke="#28a745" stroke-width="1.5"/>
  <text x="297" y="436" text-anchor="middle" class="decision">Familiar</text>
  <text x="297" y="448" text-anchor="middle" class="decision">active?</text>

  <!-- D3 YES → Familiar Help note (left) -->
  <line x1="242" y1="439" x2="185" y2="439" stroke="#28a745" stroke-width="1.5"/>
  <polygon points="180,439 188,435 188,443" fill="#28a745"/>
  <text x="200" y="432" class="yes-label">YES</text>

  <rect x="80" y="416" width="100" height="48" rx="4" fill="#20c997"/>
  <text x="130" y="430" text-anchor="middle" class="action-title">FAMILIAR: HELP</text>
  <text x="130" y="441" text-anchor="middle" class="action-detail">Grants advantage on</text>
  <text x="130" y="451" text-anchor="middle" class="action-detail">next atk vs target</text>
  <text x="130" y="461" text-anchor="middle" class="action-detail" style="font-size:6px">Owl best: Flyby = no OA</text>

  <!-- D3 NO → arrow down (continue either way) -->
  <line x1="297" y1="461" x2="297" y2="480" stroke="#333" stroke-width="1.5"/>
  <polygon points="297,485 293,477 301,477" fill="#333"/>

  <!-- ===== D4: Priority single target? ===== -->
  <polygon points="297,490 357,515 297,540 237,515" fill="#d1ecf1" stroke="#17a2b8" stroke-width="1.5"/>
  <text x="297" y="512" text-anchor="middle" class="decision">Priority single</text>
  <text x="297" y="524" text-anchor="middle" class="decision">target?</text>

  <!-- D4 NO → D6 (right) -->
  <line x1="357" y1="515" x2="403" y2="515" stroke="#28a745" stroke-width="1.5"/>
  <polygon points="408,515 400,511 400,519" fill="#28a745"/>
  <text x="370" y="508" class="yes-label">NO</text>

  <!-- ===== D6: Group / area worth controlling? ===== -->
  <polygon points="455,493 505,515 455,537 405,515" fill="#d4edda" stroke="#28a745" stroke-width="1"/>
  <text x="455" y="512" text-anchor="middle" class="decision-sm">Group worth</text>
  <text x="455" y="523" text-anchor="middle" class="decision-sm" style="font-size:7px">controlling?</text>

  <!-- D6 YES → GREASE (right) -->
  <line x1="505" y1="515" x2="520" y2="515" stroke="#fd7e14" stroke-width="1.5"/>
  <polygon points="525,515 517,511 517,519" fill="#fd7e14"/>
  <text x="507" y="508" class="yes-label" fill="#fd7e14">YES</text>

  <rect x="525" y="488" width="55" height="60" rx="4" fill="#fd7e14"/>
  <text x="552" y="503" text-anchor="middle" class="action-title">GREASE</text>
  <text x="552" y="515" text-anchor="middle" class="action-detail">DEX 13</text>
  <text x="552" y="525" text-anchor="middle" class="action-detail">10ft square</text>
  <text x="552" y="535" text-anchor="middle" class="action-detail">prone, slow</text>
  <text x="552" y="543" text-anchor="middle" class="action-detail" style="font-size:6.5px">60ft range</text>

  <!-- D6 NO → FIRE BOLT (down) -->
  <line x1="455" y1="537" x2="455" y2="558" stroke="#fd7e14" stroke-width="1.5"/>
  <polygon points="455,563 451,555 459,555" fill="#fd7e14"/>
  <text x="463" y="553" class="no-label">NO</text>

  <rect x="405" y="568" width="100" height="60" rx="4" fill="#fd7e14"/>
  <text x="455" y="584" text-anchor="middle" class="action-title">FIRE BOLT</text>
  <text x="455" y="597" text-anchor="middle" class="action-detail">Cantrip, no slot</text>
  <text x="455" y="607" text-anchor="middle" class="action-detail">+5 to hit, 1d10 fire</text>
  <text x="455" y="617" text-anchor="middle" class="action-detail">120 ft range</text>
  <text x="455" y="625" text-anchor="middle" class="action-detail" style="font-size:6.5px">Default cantrip action</text>

  <!-- D4 YES → D5 (down) -->
  <line x1="297" y1="540" x2="297" y2="558" stroke="#6f42c1" stroke-width="1.5"/>
  <polygon points="297,563 293,555 301,555" fill="#6f42c1"/>
  <text x="270" y="553" class="yes-label" fill="#6f42c1">YES</text>

  <!-- ===== D5: Tasha's free cast? ===== -->
  <polygon points="297,568 352,590 297,612 242,590" fill="#e2d4f0" stroke="#6f42c1" stroke-width="1.5"/>
  <text x="297" y="588" text-anchor="middle" class="decision-sm">Tasha's free</text>
  <text x="297" y="599" text-anchor="middle" class="decision-sm" style="font-size:7px">cast unused?</text>

  <!-- D5 YES → TASHA'S (left) -->
  <line x1="242" y1="590" x2="185" y2="590" stroke="#6f42c1" stroke-width="1.5"/>
  <polygon points="180,590 188,586 188,594" fill="#6f42c1"/>
  <text x="200" y="583" class="yes-label" fill="#6f42c1">YES</text>

  <rect x="80" y="563" width="100" height="55" rx="4" fill="#6f42c1"/>
  <text x="130" y="578" text-anchor="middle" class="action-title">TASHA'S LAUGHTER</text>
  <text x="130" y="591" text-anchor="middle" class="action-detail">Free 1/LR cast</text>
  <text x="130" y="601" text-anchor="middle" class="action-detail">WIS 13 save</text>
  <text x="130" y="611" text-anchor="middle" class="action-detail">Prone + Incap, 30ft</text>

  <!-- D5 NO → BIG HIT (down) -->
  <line x1="297" y1="612" x2="297" y2="630" stroke="#007bff" stroke-width="1.5"/>
  <polygon points="297,635 293,627 301,627" fill="#007bff"/>
  <text x="307" y="628" class="no-label" fill="#007bff">NO</text>

  <rect x="247" y="640" width="100" height="68" rx="4" fill="#007bff"/>
  <text x="297" y="656" text-anchor="middle" class="action-title">BIG HIT (slot)</text>
  <line x1="257" y1="662" x2="337" y2="662" stroke="#5aa3ff" stroke-width="0.7"/>
  <text x="297" y="673" text-anchor="middle" class="action-detail">Chromatic Orb:</text>
  <text x="297" y="682" text-anchor="middle" class="action-detail">3d8, +5 to hit, 90ft</text>
  <text x="297" y="694" text-anchor="middle" class="action-detail">Magic Missile:</text>
  <text x="297" y="703" text-anchor="middle" class="action-detail">3 × 1d4+1, auto-hit</text>

  <!-- ============ BOTTOM ROW ============ -->

  <!-- Reaction Box -->
  <rect x="15" y="725" width="135" height="92" rx="4" fill="#343a40"/>
  <text x="82" y="741" text-anchor="middle" class="box-title">⚡ REACTION</text>
  <line x1="25" y1="747" x2="140" y2="747" stroke="#555" stroke-width="1"/>
  <text x="22" y="758" class="action-title" style="fill:#fff">Shield  (1st-level)</text>
  <text x="22" y="769" class="action-detail">When hit by an attack</text>
  <text x="22" y="779" class="action-detail">or targeted by Magic</text>
  <text x="22" y="789" class="action-detail">Missile: +5 AC until</text>
  <text x="22" y="799" class="action-detail">your next turn.</text>
  <text x="22" y="809" class="action-detail">Immune: Magic Missile</text>

  <!-- Spellbook Rituals Box (replaces empty Bonus Action) -->
  <rect x="160" y="725" width="135" height="92" rx="4" fill="white" stroke="#ccc" stroke-width="1"/>
  <rect x="160" y="725" width="135" height="16" rx="4" fill="#6f42c1"/>
  <text x="227" y="736" text-anchor="middle" class="box-title">SPELLBOOK RITUALS</text>
  <text x="167" y="752" class="stat-value" style="font-size:7px">Cast from book, no slot, +10 min</text>
  <text x="167" y="763" class="stat-value" style="font-size:7px">• Comprehend Languages</text>
  <text x="167" y="773" class="stat-value" style="font-size:7px">• Detect Magic (C)</text>
  <text x="167" y="783" class="stat-value" style="font-size:7px">• Find Familiar</text>
  <text x="167" y="793" class="stat-value" style="font-size:7px">• Identify</text>
  <text x="167" y="803" class="stat-value" style="font-size:7px">• Illusory Script · Floating Disk</text>
  <text x="167" y="813" class="stat-value" style="font-size:7px">• Unseen Servant</text>

  <!-- Movement Box -->
  <rect x="305" y="725" width="135" height="92" rx="4" fill="#17a2b8"/>
  <text x="372" y="741" text-anchor="middle" class="box-title">📍 MOVEMENT</text>
  <line x1="315" y1="747" x2="430" y2="747" stroke="#138496" stroke-width="1"/>
  <text x="312" y="758" class="action-detail">Speed: 30 ft</text>
  <text x="312" y="768" class="action-detail">Optimal range:</text>
  <text x="312" y="778" class="action-detail">60–120 ft from foes</text>
  <text x="312" y="789" class="action-detail">Half cover: +2 AC</text>
  <text x="312" y="799" class="action-detail">¾ cover: +5 AC</text>
  <text x="312" y="809" class="action-detail">Total cover: untargetable</text>

  <!-- Cantrips -->
  <rect x="450" y="725" width="130" height="92" rx="4" fill="white" stroke="#ccc" stroke-width="1"/>
  <rect x="450" y="725" width="130" height="16" rx="4" fill="#20c997"/>
  <text x="515" y="736" text-anchor="middle" class="box-title">CANTRIPS (At Will)</text>
  <text x="455" y="752" class="stat-label" style="font-size:7.5px">Combat:</text>
  <text x="455" y="762" class="stat-value" style="font-size:7px">Fire Bolt (+5, 1d10, 120ft)</text>
  <text x="455" y="773" class="stat-label" style="font-size:7.5px">Utility:</text>
  <text x="455" y="783" class="stat-value" style="font-size:7px">Mage Hand · Light · Mending</text>
  <text x="455" y="792" class="stat-value" style="font-size:7px">Message · Thaumaturgy</text>
  <text x="455" y="801" class="stat-value" style="font-size:7px">Dancing Lights</text>
  <text x="515" y="813" text-anchor="middle" class="stat-value" style="font-size:6px">Wizard · Mag.Init · Fiendish · OW Pres.</text>

  <!-- Footer Reminder -->
  <rect x="15" y="827" width="565" height="14" rx="3" fill="#fff3cd" stroke="#856404" stroke-width="1"/>
  <text x="297" y="838" text-anchor="middle" class="stat-label" style="font-size:8.5px">⚠ Still fragile at HP 10. Always Mage Armor up. Save 1 slot for Shield. Darkvision 60ft. Fire resistance.</text>
</svg>