<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 595 842" width="595" height="842">
  <!-- ============================================================
       BATTLE STRATEGY TEMPLATE  (see STYLE-GUIDE.md for the rules)
       A4 = 595 x 842 @ 72dpi. White bg. Body >=9px, notes >=8px.
       Near-black ink. Shapes: triangle=survival (+ "!"),
       diamond=control, circle=attack. Edge labels = white chips
       BESIDE the arrow centre (L/R for vertical, above/below for
       horizontal). Stats from ddb-mcp only; stamp Synced after a pull.
       Fill the labelled regions; copy primitives from SNIPPET LIBRARY.
       ============================================================ -->
  <style>
    .title       { font: bold 17px Arial, sans-serif; fill: #ffffff; }
    .subtitle    { font: bold 10px Arial, sans-serif; fill: #ececf5; }
    .box-title   { font: bold 10px Arial, sans-serif; fill: #ffffff; }
    .node        { font: bold 12px Arial, sans-serif; fill: #ffffff; }
    .decision    { font: bold 10px Arial, sans-serif; fill: #111111; }
    .decision-sm { font: bold 9px Arial, sans-serif;  fill: #111111; }
    .act-title   { font: bold 10px Arial, sans-serif; fill: #ffffff; }
    .act-detail  { font: 9px Arial, sans-serif;       fill: #ffffff; }
    .act-note    { font: italic 8px Arial, sans-serif; fill: #f0f0f0; }
    .stat-label  { font: bold 9px Arial, sans-serif;  fill: #111111; }
    .stat-value  { font: 9px Arial, sans-serif;       fill: #1a1a2e; }
    .key-sub     { font: italic 8px Arial, sans-serif; fill: #555555; }
    .chip        { font: bold 10px Arial, sans-serif; }
    .bang        { font: bold 6px Arial, sans-serif;  fill: #5a1a00; }
    .foot        { font: bold 9px Arial, sans-serif;  fill: #1a1a2e; }
    .ph          { font: italic 9px Arial, sans-serif; fill: #b0b0b0; }
  </style>

  <rect width="595" height="842" fill="#ffffff"/>

  <!-- ===== 1. HEADER (dark bar) ===== -->
  <rect x="15" y="10" width="565" height="46" rx="6" fill="#1a1a2e"/>
  <text x="297" y="32" text-anchor="middle" class="title">NAME - BATTLE STRATEGY</text>
  <text x="297" y="48" text-anchor="middle" class="subtitle">Lv? Race Class | HP ? | AC ? | Spell DC ? | Atk +? | key resources</text>

  <!-- ===== 2. REFERENCE ROW (3 boxes) ===== -->
  <rect x="15" y="62" width="180" height="92" rx="4" fill="#ffffff" stroke="#555" stroke-width="1.5"/>
  <rect x="15" y="62" width="180" height="18" rx="4" fill="#495057"/>
  <text x="105" y="75" text-anchor="middle" class="box-title">QUICK REFERENCE</text>
  <text x="105" y="112" text-anchor="middle" class="ph">key attacks / resources</text>

  <rect x="205" y="62" width="180" height="92" rx="4" fill="#ffffff" stroke="#9e1b27" stroke-width="1.5"/>
  <rect x="205" y="62" width="180" height="18" rx="4" fill="#b32330"/>
  <polygon points="218,67 213,76 223,76" fill="#ffd633" stroke="#7a1019" stroke-width="0.8"/>
  <text x="218" y="74.5" text-anchor="middle" class="bang">!</text>
  <text x="300" y="75" text-anchor="middle" class="box-title">SURVIVAL PRIORITY</text>
  <text x="295" y="112" text-anchor="middle" class="ph">how to not die</text>

  <rect x="395" y="62" width="185" height="92" rx="4" fill="#ffffff" stroke="#5a3a91" stroke-width="1.5"/>
  <rect x="395" y="62" width="185" height="18" rx="4" fill="#6f42c1"/>
  <text x="487" y="75" text-anchor="middle" class="box-title">CLASS BOX (spells/weapons)</text>
  <text x="487" y="112" text-anchor="middle" class="ph">class-specific reference</text>

  <!-- ===== 3. PRE-COMBAT BANNER (amber) ===== -->
  <rect x="15" y="160" width="565" height="46" rx="4" fill="#fff3cd" stroke="#856404" stroke-width="1.5"/>
  <polygon points="27,168 21,178 33,178" fill="#d9690a" stroke="#5a4500" stroke-width="0.8"/>
  <text x="27" y="176.5" text-anchor="middle" class="bang">!</text>
  <text x="300" y="186" text-anchor="middle" class="ph">BEFORE COMBAT: buffs, summons, free casts to set up before initiative</text>

  <!-- ===== 4. SYMBOL KEY (top-right of flowchart) =====
       Row pitch 26px; italic example 10px below its label; last example
       kept ~8px clear of the box edge. Drop a row if a shape is unused on
       the sheet (e.g. a martial with no control spell). Diamond + circle
       are white-filled with a #333 outline to match the icons on the boxes. -->
  <rect x="400" y="214" width="180" height="104" rx="4" fill="#ffffff" stroke="#555" stroke-width="1.5"/>
  <rect x="400" y="214" width="180" height="18" rx="4" fill="#495057"/>
  <text x="490" y="227" text-anchor="middle" class="box-title">SYMBOL KEY</text>
  <polygon points="412,240 406,250 418,250" fill="#ffd633" stroke="#7a1019" stroke-width="0.8"/>
  <text x="412" y="249" text-anchor="middle" class="bang">!</text>
  <text x="428" y="248" class="stat-label">Survival / defensive</text>
  <text x="428" y="258" class="key-sub">disengage, hide, defend</text>
  <polygon points="412,266 419,273 412,280 405,273" fill="#ffffff" stroke="#333333" stroke-width="1.2"/>
  <text x="428" y="274" class="stat-label">Control / utility</text>
  <text x="428" y="284" class="key-sub">saves, conditions, terrain</text>
  <circle cx="412" cy="298" r="6" fill="#ffffff" stroke="#333333" stroke-width="1.2"/>
  <text x="428" y="300" class="stat-label">Attack / damage</text>
  <text x="428" y="310" class="key-sub">cantrip or slotted damage</text>

  <!-- ===== 5. MAIN FLOWCHART ===== -->
  <ellipse cx="297" cy="226" rx="56" ry="17" fill="#2d6a4f" stroke="#13402e" stroke-width="1.5"/>
  <text x="297" y="231" text-anchor="middle" class="node">YOUR TURN</text>
  <text x="240" y="430" class="ph">[ build the decision flow here: survival check ->
  </text>
  <text x="240" y="444" class="ph">positioning -> resource/attack logic. No dead ends. ]</text>

  <!-- ===== 6. BOTTOM UTILITY ROW (4 boxes) ===== -->
  <rect x="15"  y="700" width="135" height="100" rx="4" fill="#343a40" stroke="#15181c" stroke-width="1.5"/>
  <text x="82"  y="716" text-anchor="middle" class="box-title">REACTION</text>
  <rect x="160" y="700" width="135" height="100" rx="4" fill="#ffffff" stroke="#5a3a91" stroke-width="1.5"/>
  <rect x="160" y="700" width="135" height="18" rx="4" fill="#6f42c1"/>
  <text x="227" y="713" text-anchor="middle" class="box-title">RITUALS / BONUS</text>
  <rect x="305" y="700" width="135" height="100" rx="4" fill="#138496" stroke="#0a4a52" stroke-width="1.5"/>
  <text x="372" y="716" text-anchor="middle" class="box-title">MOVEMENT</text>
  <rect x="450" y="700" width="130" height="100" rx="4" fill="#ffffff" stroke="#117a5f" stroke-width="1.5"/>
  <rect x="450" y="700" width="130" height="18" rx="4" fill="#20a07a"/>
  <text x="515" y="713" text-anchor="middle" class="box-title">CANTRIPS / AT-WILL</text>

  <!-- ===== 7. FOOTER (amber, with sync stamp) ===== -->
  <rect x="15" y="806" width="565" height="30" rx="4" fill="#fff3cd" stroke="#856404" stroke-width="1.5"/>
  <polygon points="27,812 21,822 33,822" fill="#d9690a" stroke="#5a4500" stroke-width="0.8"/>
  <text x="27" y="820.5" text-anchor="middle" class="bang">!</text>
  <text x="302" y="820" text-anchor="middle" class="foot" fill="#5a4500">One-line key reminder for this character.</text>
  <text x="302" y="832" text-anchor="middle" class="stat-value" fill="#5a4500" style="font-size:8px">Synced: YYYY-MM-DD  -  Lv?  -  regenerate from D&amp;D Beyond after level-ups</text>

  <!-- ============================================================
       SNIPPET LIBRARY  (copy out of the visible area when building;
       these sit below the page and are not part of the A4 export.)
       ============================================================ -->
  <g transform="translate(0,860)">
    <!-- decision diamond (cx,cy=297,28 here) -->
    <polygon points="297,0 365,28 297,56 229,28" fill="#d1ecf1" stroke="#117a8b" stroke-width="2"/>
    <text x="297" y="25" text-anchor="middle" class="decision">Decision line 1</text>
    <text x="297" y="38" text-anchor="middle" class="decision">line 2?</text>

    <!-- action box: TRIANGLE (survival, red) -->
    <rect x="55" y="0" width="129" height="56" rx="4" fill="#1e7e34" stroke="#0f3d19" stroke-width="1.5"/>
    <polygon points="68,11 63,20 73,20" fill="#ffd633" stroke="#0f3d19" stroke-width="0.8"/>
    <text x="68" y="19" text-anchor="middle" class="bang">!</text>
    <text x="124" y="18" text-anchor="middle" class="act-title">SURVIVAL BOX</text>
    <text x="119" y="33" text-anchor="middle" class="act-detail">detail line 9px</text>
    <text x="119" y="45" text-anchor="middle" class="act-note">note line 8px italic</text>

    <!-- action box: DIAMOND (control, purple) -->
    <rect x="405" y="0" width="129" height="56" rx="4" fill="#6f42c1" stroke="#3c2363" stroke-width="1.5"/>
    <polygon points="418,11 423,17 418,23 413,17" fill="#ffffff" stroke="#3c2363" stroke-width="0.8"/>
    <text x="474" y="18" text-anchor="middle" class="act-title">CONTROL BOX</text>
    <text x="469" y="33" text-anchor="middle" class="act-detail">detail line 9px</text>

    <!-- action box: CIRCLE (attack, blue) -->
    <rect x="230" y="70" width="129" height="50" rx="4" fill="#0069d9" stroke="#003e80" stroke-width="1.5"/>
    <circle cx="245" cy="84" r="4.5" fill="#ffffff" stroke="#003e80" stroke-width="0.8"/>
    <text x="297" y="87" text-anchor="middle" class="act-title">ATTACK BOX</text>
    <text x="294" y="102" text-anchor="middle" class="act-detail">detail line 9px</text>

    <!-- CHIP: vertical arrow, chip to the RIGHT of centre -->
    <line x1="100" y1="80" x2="100" y2="120" stroke="#1e7e34" stroke-width="2.5"/>
    <polygon points="100,126 95,120 105,120" fill="#1e7e34"/>
    <rect x="106" y="93" width="26" height="13" rx="3" fill="#ffffff" stroke="#1e7e34" stroke-width="0.8"/>
    <text x="119" y="102.5" text-anchor="middle" class="chip" fill="#1e7e34">NO</text>

    <!-- CHIP: horizontal arrow, chip ABOVE centre -->
    <line x1="400" y1="100" x2="445" y2="100" stroke="#9e1b27" stroke-width="2.5"/>
    <polygon points="451,100 445,95 445,105" fill="#9e1b27"/>
    <rect x="409" y="84" width="26" height="13" rx="3" fill="#ffffff" stroke="#9e1b27" stroke-width="0.8"/>
    <text x="422" y="93.5" text-anchor="middle" class="chip" fill="#9e1b27">YES</text>
  </g>

  <!-- ============================================================
       SNIPPET LIBRARY 2 — LAYOUT VARIATIONS (also below the page;
       use whichever the character needs. See STYLE-GUIDE.md.)
       ============================================================ -->
  <g transform="translate(0,1010)">
    <!-- VARIANT A: single full-width REFERENCE STRIP (use instead of the
         3-box row for martials with little to track, e.g. Oskar). -->
    <rect x="15" y="0" width="565" height="40" rx="4" fill="#ffffff" stroke="#555" stroke-width="1.5"/>
    <rect x="15" y="0" width="565" height="16" rx="4" fill="#495057"/>
    <text x="297" y="12" text-anchor="middle" class="box-title">QUICK REFERENCE (full-width strip)</text>
    <text x="22" y="29" class="stat-label">Weapons:</text>
    <text x="80" y="29" class="stat-value">one-line stat list when there is little to track</text>

    <!-- INLINE MID-FLOW CALLOUT BANNER (a reminder inside the flow,
         e.g. Lysander's "give Bardic Inspiration"). Colour by role. -->
    <rect x="200" y="56" width="195" height="30" rx="5" fill="#6f42c1" stroke="#3c2363" stroke-width="1.5"/>
    <text x="297" y="69" text-anchor="middle" class="act-title">BONUS: consider X (1/LR)</text>
    <text x="297" y="81" text-anchor="middle" class="act-detail">one-line prompt</text>

    <!-- SECTION DIVIDER + TITLE (for sheets split into sections below the
         flow instead of one chart, e.g. Oskar). Dashed rule + centred title. -->
    <line x1="20" y1="104" x2="575" y2="104" stroke="#c0c4d0" stroke-width="1" stroke-dasharray="4,3"/>
    <text x="297" y="120" text-anchor="middle" style="font:bold 11px Arial,sans-serif;fill:#1a1a2e">SECTION TITLE</text>

    <!-- TERMINAL OUTCOME ROW (several side-by-side result boxes ending the
         flow). Action boxes also appear on the RIGHT of the centre line,
         mirroring the left ones — branch both ways as needed. -->
    <rect x="70"  y="132" width="110" height="46" rx="4" fill="#6f42c1" stroke="#3c2363" stroke-width="1.5"/>
    <polygon points="83,143 88,148 83,153 78,148" fill="#ffffff" stroke="#3c2363" stroke-width="0.8"/>
    <text x="128" y="150" text-anchor="middle" class="act-title">OUTCOME A</text>
    <text x="125" y="165" text-anchor="middle" class="act-detail">detail</text>
    <rect x="190" y="132" width="110" height="46" rx="4" fill="#1e7e34" stroke="#0f3d19" stroke-width="1.5"/>
    <text x="245" y="150" text-anchor="middle" class="act-title">OUTCOME B</text>
    <text x="245" y="165" text-anchor="middle" class="act-detail">detail</text>
    <rect x="310" y="132" width="110" height="46" rx="4" fill="#0069d9" stroke="#003e80" stroke-width="1.5"/>
    <circle cx="323" cy="148" r="4.5" fill="#ffffff" stroke="#003e80" stroke-width="0.8"/>
    <text x="368" y="150" text-anchor="middle" class="act-title">OUTCOME C</text>
    <text x="365" y="165" text-anchor="middle" class="act-detail">detail</text>
    <rect x="430" y="132" width="110" height="46" rx="4" fill="#d9690a" stroke="#8a4205" stroke-width="1.5"/>
    <text x="485" y="150" text-anchor="middle" class="act-title">OUTCOME D</text>
    <text x="485" y="165" text-anchor="middle" class="act-detail">detail</text>

    <!-- THIN FULL-WIDTH SUMMARY STRIP (e.g. Oskar's damage-per-turn). -->
    <rect x="15" y="190" width="565" height="26" rx="4" fill="#ffffff" stroke="#555" stroke-width="1.5"/>
    <text x="297" y="200" text-anchor="middle" class="stat-label">DAMAGE / SUMMARY STRIP</text>
    <text x="297" y="211" text-anchor="middle" class="stat-value">optional one-line totals</text>

    <!-- EXTRA BOTTOM BOX-ROW (1-2 boxes below the footer, e.g. Lysander/
         Clover "Situational Options" / "Weapons (last resort)"). -->
    <rect x="15"  y="224" width="278" height="30" rx="4" fill="#ffffff" stroke="#555" stroke-width="1.5"/>
    <rect x="15"  y="224" width="278" height="16" rx="4" fill="#343a40"/>
    <text x="154" y="236" text-anchor="middle" class="box-title">WEAPONS (last resort)</text>
    <rect x="302" y="224" width="278" height="30" rx="4" fill="#ffffff" stroke="#5a3a91" stroke-width="1.5"/>
    <rect x="302" y="224" width="278" height="16" rx="4" fill="#6f42c1"/>
    <text x="441" y="236" text-anchor="middle" class="box-title">SITUATIONAL OPTIONS</text>
  </g>
</svg>
