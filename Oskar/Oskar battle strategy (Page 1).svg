<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 595 842" width="595" height="842">
  <!-- Built from _template.svg / STYLE-GUIDE.md. Stats synced from D&D Beyond (id 155830640).
       Uses the full-width reference strip + a sectioned positioning row (layout variations). -->
  <style>
    .title       { font: bold 17px Arial, sans-serif; fill: #ffffff; }
    .subtitle    { font: bold 10px Arial, sans-serif; fill: #ececf5; }
    .box-title   { font: bold 10px Arial, sans-serif; fill: #ffffff; }
    .node        { font: bold 12px Arial, sans-serif; fill: #ffffff; }
    .decision    { font: bold 10px Arial, sans-serif; fill: #111111; }
    .decision-sm { font: bold 9px Arial, sans-serif;  fill: #111111; }
    .act-title   { font: bold 10px Arial, sans-serif; fill: #ffffff; }
    .act-detail  { font: 9px Arial, sans-serif;       fill: #ffffff; }
    .act-note    { font: italic 8px Arial, sans-serif; fill: #f0f0f0; }
    .stat-label  { font: bold 9px Arial, sans-serif;  fill: #111111; }
    .stat-value  { font: 9px Arial, sans-serif;       fill: #1a1a2e; }
    .key-sub     { font: italic 8px Arial, sans-serif; fill: #555555; }
    .chip        { font: bold 10px Arial, sans-serif; }
    .bang        { font: bold 6px Arial, sans-serif;  fill: #5a1a00; }
    .sect        { font: bold 11px Arial, sans-serif; fill: #1a1a2e; }
    .foot        { font: bold 9px Arial, sans-serif;  fill: #1a1a2e; }
  </style>

  <rect width="595" height="842" fill="#ffffff"/>

  <!-- HEADER -->
  <rect x="15" y="10" width="565" height="46" rx="6" fill="#1a1a2e"/>
  <text x="297" y="32" text-anchor="middle" class="title">OSKAR - BATTLE STRATEGY</text>
  <text x="297" y="48" text-anchor="middle" class="subtitle">Lv2 Halfling Rogue  |  HP 15  |  AC 14  |  Init +5  |  Speed 30ft  |  Sneak Attack +1d6 (1/turn)</text>

  <!-- FULL-WIDTH QUICK REFERENCE STRIP -->
  <rect x="15" y="62" width="565" height="58" rx="4" fill="#ffffff" stroke="#555" stroke-width="1.5"/>
  <rect x="15" y="62" width="565" height="18" rx="4" fill="#495057"/>
  <text x="297" y="75" text-anchor="middle" class="box-title">QUICK REFERENCE</text>
  <text x="22" y="93"  class="stat-label">Weapons:</text><text x="78" y="93"  class="stat-value">Shortsword +5, 1d6+3 (Vex)  |  Dagger +5, 1d4+3 (Nick)  |  Shortbow +5, 1d6+3 (Vex) 80/320</text>
  <text x="22" y="105" class="stat-label">Mastery:</text><text x="74" y="105" class="stat-value">Vex = on hit, ADV on your next attack vs target  |  Nick = extra Light attack within your Attack (frees bonus action)</text>
  <text x="22" y="116" class="stat-label">Halfling:</text><text x="76" y="116" class="stat-value">Luck (reroll 1s) | Brave (adv vs Frightened) | Nimbleness (pass bigger foes) | Naturally Stealthy | Init +5 (Alert)</text>

  <!-- SYMBOL KEY -->
  <rect x="400" y="126" width="180" height="76" rx="4" fill="#ffffff" stroke="#555" stroke-width="1.5"/>
  <rect x="400" y="126" width="180" height="18" rx="4" fill="#495057"/>
  <text x="490" y="139" text-anchor="middle" class="box-title">SYMBOL KEY</text>
  <polygon points="412,152 406,162 418,162" fill="#ffd633" stroke="#7a1019" stroke-width="0.8"/>
  <text x="412" y="161" text-anchor="middle" class="bang">!</text>
  <text x="428" y="160" class="stat-label">Survival / defensive</text>
  <text x="428" y="170" class="key-sub">disengage, dash, hide</text>
  <circle cx="412" cy="186" r="6" fill="#ffffff" stroke="#333333" stroke-width="1.2"/>
  <text x="428" y="187" class="stat-label">Attack / Sneak Attack</text>
  <text x="428" y="197" class="key-sub">Vex, Nick, Shortbow</text>

  <!-- ===== FLOWCHART ===== -->
  <ellipse cx="297" cy="150" rx="56" ry="17" fill="#2d6a4f" stroke="#13402e" stroke-width="1.5"/>
  <text x="297" y="155" text-anchor="middle" class="node">YOUR TURN</text>
  <line x1="297" y1="167" x2="297" y2="171" stroke="#333" stroke-width="2.5"/>
  <polygon points="297,177 292,171 302,171" fill="#333"/>

  <!-- D1: HP/surrounded? cy205 -->
  <polygon points="297,177 365,205 297,233 229,205" fill="#f8d7da" stroke="#9e1b27" stroke-width="2"/>
  <text x="297" y="201" text-anchor="middle" class="decision">HP 5 or less</text>
  <text x="297" y="214" text-anchor="middle" class="decision">or surrounded?</text>
  <!-- SURVIVE box (left) -->
  <rect x="40" y="177" width="148" height="56" rx="4" fill="#b32330" stroke="#6e0f17" stroke-width="1.5"/>
  <polygon points="54,188 49,197 59,197" fill="#ffd633" stroke="#6e0f17" stroke-width="0.8"/>
  <text x="54" y="196" text-anchor="middle" class="bang">!</text>
  <text x="117" y="193" text-anchor="middle" class="act-title">SURVIVE</text>
  <text x="114" y="207" text-anchor="middle" class="act-detail">Bonus: Disengage or Hide</text>
  <text x="114" y="219" text-anchor="middle" class="act-detail">Action: Dash to safety</text>
  <text x="114" y="229" text-anchor="middle" class="act-note">Nimbleness: slip past big foes</text>
  <!-- D1 YES -> SURVIVE (chip above) -->
  <line x1="229" y1="205" x2="192" y2="205" stroke="#9e1b27" stroke-width="2.5"/>
  <polygon points="188,205 196,201 196,209" fill="#9e1b27"/>
  <rect x="195" y="189" width="26" height="13" rx="3" fill="#ffffff" stroke="#9e1b27" stroke-width="0.8"/>
  <text x="208" y="198.5" text-anchor="middle" class="chip" fill="#9e1b27">YES</text>
  <!-- D1 NO down (chip right) -->
  <line x1="297" y1="233" x2="297" y2="266" stroke="#1e7e34" stroke-width="2.5"/>
  <polygon points="297,272 292,266 302,266" fill="#1e7e34"/>
  <rect x="303" y="243" width="26" height="13" rx="3" fill="#ffffff" stroke="#1e7e34" stroke-width="0.8"/>
  <text x="316" y="252.5" text-anchor="middle" class="chip" fill="#1e7e34">NO</text>

  <!-- D2: ally next to target? cy300 -->
  <polygon points="297,272 365,300 297,328 229,300" fill="#d4edda" stroke="#1e7e34" stroke-width="2"/>
  <text x="297" y="296" text-anchor="middle" class="decision">Ally next to</text>
  <text x="297" y="309" text-anchor="middle" class="decision">your target?</text>
  <!-- SNEAK COMBO box (left) -->
  <rect x="40" y="272" width="148" height="56" rx="4" fill="#1e7e34" stroke="#0f3d19" stroke-width="1.5"/>
  <circle cx="54" cy="285" r="4.5" fill="#ffffff" stroke="#0f3d19" stroke-width="0.8"/>
  <text x="118" y="288" text-anchor="middle" class="act-title">SNEAK COMBO</text>
  <text x="114" y="302" text-anchor="middle" class="act-detail">Shortsword +5: 1d6+3 +1d6 SA</text>
  <text x="114" y="314" text-anchor="middle" class="act-detail">then Dagger (Nick): 1d4+3</text>
  <text x="114" y="324" text-anchor="middle" class="act-note">ally adjacent = auto Sneak Attack</text>
  <!-- D2 YES -> SNEAK (chip above) -->
  <line x1="229" y1="300" x2="192" y2="300" stroke="#1e7e34" stroke-width="2.5"/>
  <polygon points="188,300 196,296 196,304" fill="#1e7e34"/>
  <rect x="195" y="284" width="26" height="13" rx="3" fill="#ffffff" stroke="#1e7e34" stroke-width="0.8"/>
  <text x="208" y="293.5" text-anchor="middle" class="chip" fill="#1e7e34">YES</text>
  <!-- D2 NO down (chip right) -->
  <line x1="297" y1="328" x2="297" y2="361" stroke="#1e7e34" stroke-width="2.5"/>
  <polygon points="297,367 292,361 302,361" fill="#1e7e34"/>
  <rect x="303" y="338" width="26" height="13" rx="3" fill="#ffffff" stroke="#1e7e34" stroke-width="0.8"/>
  <text x="316" y="347.5" text-anchor="middle" class="chip" fill="#1e7e34">NO</text>

  <!-- D3: hidden or advantage? cy395 -->
  <polygon points="297,367 365,395 297,423 229,395" fill="#fff3cd" stroke="#856404" stroke-width="2"/>
  <text x="297" y="391" text-anchor="middle" class="decision">Hidden or have</text>
  <text x="297" y="404" text-anchor="middle" class="decision">advantage?</text>
  <!-- AMBUSH box (left) -->
  <rect x="40" y="367" width="148" height="56" rx="4" fill="#4c51bf" stroke="#272a66" stroke-width="1.5"/>
  <circle cx="54" cy="380" r="4.5" fill="#ffffff" stroke="#272a66" stroke-width="0.8"/>
  <text x="118" y="383" text-anchor="middle" class="act-title">AMBUSH STRIKE</text>
  <text x="114" y="397" text-anchor="middle" class="act-detail">Shortsword +5 (advantage):</text>
  <text x="114" y="409" text-anchor="middle" class="act-detail">1d6+3 +1d6 SA, then Dagger</text>
  <text x="114" y="419" text-anchor="middle" class="act-note">advantage qualifies Sneak Attack</text>
  <!-- D3 YES -> AMBUSH (chip above) -->
  <line x1="229" y1="395" x2="192" y2="395" stroke="#4c51bf" stroke-width="2.5"/>
  <polygon points="188,395 196,391 196,399" fill="#4c51bf"/>
  <rect x="195" y="379" width="26" height="13" rx="3" fill="#ffffff" stroke="#272a66" stroke-width="0.8"/>
  <text x="208" y="388.5" text-anchor="middle" class="chip" fill="#272a66">YES</text>
  <!-- D3 NO down (chip right) -->
  <line x1="297" y1="423" x2="297" y2="456" stroke="#1e7e34" stroke-width="2.5"/>
  <polygon points="297,462 292,456 302,456" fill="#1e7e34"/>
  <rect x="303" y="433" width="26" height="13" rx="3" fill="#ffffff" stroke="#1e7e34" stroke-width="0.8"/>
  <text x="316" y="442.5" text-anchor="middle" class="chip" fill="#1e7e34">NO</text>

  <!-- D4: enemy in melee? cy490 -->
  <polygon points="297,462 365,490 297,518 229,490" fill="#d1ecf1" stroke="#117a8b" stroke-width="2"/>
  <text x="297" y="486" text-anchor="middle" class="decision">Enemy in</text>
  <text x="297" y="499" text-anchor="middle" class="decision">melee reach?</text>
  <!-- VEX -> NICK box (left) -->
  <rect x="40" y="462" width="148" height="56" rx="4" fill="#d9690a" stroke="#8a4205" stroke-width="1.5"/>
  <circle cx="54" cy="475" r="4.5" fill="#ffffff" stroke="#8a4205" stroke-width="0.8"/>
  <text x="118" y="478" text-anchor="middle" class="act-title">VEX -&gt; NICK</text>
  <text x="114" y="492" text-anchor="middle" class="act-detail">Shortsword (Vex) +5: 1d6+3</text>
  <text x="114" y="504" text-anchor="middle" class="act-detail">then Dagger (Nick): +1d6 SA</text>
  <text x="114" y="514" text-anchor="middle" class="act-note">best Sneak Attack, no setup</text>
  <!-- D4 YES -> VEX-NICK (chip above) -->
  <line x1="229" y1="490" x2="192" y2="490" stroke="#d9690a" stroke-width="2.5"/>
  <polygon points="188,490 196,486 196,494" fill="#d9690a"/>
  <rect x="195" y="474" width="26" height="13" rx="3" fill="#ffffff" stroke="#a04e08" stroke-width="0.8"/>
  <text x="208" y="483.5" text-anchor="middle" class="chip" fill="#a04e08">YES</text>
  <!-- D4 NO -> RANGED (right, chip above) -->
  <line x1="365" y1="490" x2="434" y2="490" stroke="#0069d9" stroke-width="2.5"/>
  <polygon points="440,490 432,486 432,494" fill="#0069d9"/>
  <rect x="388" y="474" width="26" height="13" rx="3" fill="#ffffff" stroke="#003e80" stroke-width="0.8"/>
  <text x="401" y="483.5" text-anchor="middle" class="chip" fill="#003e80">NO</text>
  <!-- RANGED box (right) -->
  <rect x="440" y="463" width="140" height="56" rx="4" fill="#0069d9" stroke="#003e80" stroke-width="1.5"/>
  <circle cx="454" cy="476" r="4.5" fill="#ffffff" stroke="#003e80" stroke-width="0.8"/>
  <text x="514" y="479" text-anchor="middle" class="act-title">RANGED</text>
  <text x="510" y="493" text-anchor="middle" class="act-detail">Shortbow (Vex) +5</text>
  <text x="510" y="505" text-anchor="middle" class="act-detail">1d6+3, 80/320 ft</text>
  <text x="510" y="515" text-anchor="middle" class="act-note">no SA unless adv or ally flank</text>

  <!-- ===== SECTION: POSITIONING FOR SNEAK ATTACK ===== -->
  <line x1="20" y1="540" x2="575" y2="540" stroke="#c0c4d0" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="297" y="556" text-anchor="middle" class="sect">POSITIONING FOR SNEAK ATTACK</text>
  <rect x="15" y="564" width="184" height="60" rx="4" fill="#1e7e34" stroke="#0f3d19" stroke-width="1.5"/>
  <text x="107" y="579" text-anchor="middle" class="act-title">BEST: beside an ally</text>
  <text x="107" y="593" text-anchor="middle" class="act-detail">Attack a foe your ally is next to</text>
  <text x="107" y="605" text-anchor="middle" class="act-detail">= Sneak Attack is automatic.</text>
  <text x="107" y="617" text-anchor="middle" class="act-note">Then slip behind cover.</text>
  <rect x="205" y="564" width="184" height="60" rx="4" fill="#4c51bf" stroke="#272a66" stroke-width="1.5"/>
  <text x="297" y="579" text-anchor="middle" class="act-title">GOOD: use cover</text>
  <text x="297" y="593" text-anchor="middle" class="act-detail">Stay near objects/creatures so</text>
  <text x="297" y="605" text-anchor="middle" class="act-detail">you can Hide (BA) for advantage</text>
  <text x="297" y="617" text-anchor="middle" class="act-note">-> next-turn Ambush Strike.</text>
  <rect x="395" y="564" width="185" height="60" rx="4" fill="#d9690a" stroke="#8a4205" stroke-width="1.5"/>
  <text x="487" y="579" text-anchor="middle" class="act-title">OK: stay at range</text>
  <text x="487" y="593" text-anchor="middle" class="act-detail">No setup? Shortbow from 80ft,</text>
  <text x="487" y="605" text-anchor="middle" class="act-detail">or Vex-&gt;Nick in melee.</text>
  <text x="487" y="617" text-anchor="middle" class="act-note">15 HP - keep moving.</text>

  <!-- ===== BOTTOM UTILITY ROW ===== -->
  <rect x="15" y="700" width="135" height="100" rx="4" fill="#343a40" stroke="#15181c" stroke-width="1.5"/>
  <text x="82" y="716" text-anchor="middle" class="box-title">REACTION</text>
  <line x1="25" y1="722" x2="140" y2="722" stroke="#666" stroke-width="1.2"/>
  <text x="22" y="736" class="act-title">Opportunity Attack</text>
  <text x="22" y="750" class="act-detail">Shortsword / Dagger +5</text>
  <text x="22" y="762" class="act-detail">when a foe leaves reach.</text>
  <text x="22" y="776" class="act-detail">Can carry a 2nd Sneak</text>
  <text x="22" y="788" class="act-note">Attack (it's once per TURN).</text>

  <rect x="160" y="700" width="135" height="100" rx="4" fill="#4c51bf" stroke="#272a66" stroke-width="1.5"/>
  <text x="227" y="716" text-anchor="middle" class="box-title">BONUS ACTION</text>
  <line x1="170" y1="722" x2="285" y2="722" stroke="#8a8fd6" stroke-width="1.2"/>
  <text x="227" y="738" text-anchor="middle" class="act-title">CUNNING ACTION</text>
  <text x="227" y="752" text-anchor="middle" class="act-detail">Dash / Disengage / Hide</text>
  <text x="227" y="766" text-anchor="middle" class="act-detail">Nick gives a free Light</text>
  <text x="227" y="778" text-anchor="middle" class="act-detail">attack in your Attack, so</text>
  <text x="227" y="790" text-anchor="middle" class="act-note">your bonus action stays open.</text>

  <rect x="305" y="700" width="135" height="100" rx="4" fill="#138496" stroke="#0a4a52" stroke-width="1.5"/>
  <text x="372" y="716" text-anchor="middle" class="box-title">MOVEMENT</text>
  <line x1="315" y1="722" x2="430" y2="722" stroke="#0d6473" stroke-width="1.2"/>
  <text x="312" y="736" class="act-detail">Speed: 30 ft</text>
  <text x="312" y="750" class="act-detail">Get beside an ally's</text>
  <text x="312" y="762" class="act-detail">target, or to cover.</text>
  <text x="312" y="776" class="act-detail">Nimbleness: move thru</text>
  <text x="312" y="788" class="act-detail">bigger creatures.</text>

  <rect x="450" y="700" width="130" height="100" rx="4" fill="#ffffff" stroke="#117a5f" stroke-width="1.5"/>
  <rect x="450" y="700" width="130" height="18" rx="4" fill="#20a07a"/>
  <text x="515" y="713" text-anchor="middle" class="box-title">SNEAK ATTACK</text>
  <text x="455" y="731" class="stat-value">+1d6, once per TURN</text>
  <text x="455" y="744" class="stat-value">Needs: advantage, OR</text>
  <text x="455" y="757" class="stat-value">an ally within 5ft of</text>
  <text x="455" y="770" class="stat-value">the target (and no disadv).</text>
  <text x="455" y="784" class="stat-value">Take it on your 1st</text>
  <text x="455" y="795" class="key-sub">qualifying hit. Luck: reroll 1s.</text>

  <!-- FOOTER -->
  <rect x="15" y="801" width="565" height="21" rx="4" fill="#fff3cd" stroke="#856404" stroke-width="1.5"/>
  <polygon points="27,805 21,814 33,814" fill="#d9690a" stroke="#5a4500" stroke-width="0.8"/>
  <text x="27" y="813" text-anchor="middle" class="bang" fill="#ffffff">!</text>
  <text x="302" y="811" text-anchor="middle" class="foot" fill="#5a4500">Sneak Attack is once per TURN - an Opportunity Attack on the enemy's turn can land a 2nd per round. ~15.5 dmg/turn.</text>
  <text x="302" y="819" text-anchor="middle" class="stat-value" fill="#5a4500" style="font-size:8px">Synced: 2026-06-01  -  Lv2  -  regenerate from D&amp;D Beyond after level-ups</text>
